# =============================================================
# DOCKER-COMPOSE.INFRA.YML
# Infrastructure persistante : DB, Auth, Monitoring
# Ce fichier est gere MANUELLEMENT sur la VM Desktop.
# Jenkins NE DOIT JAMAIS toucher a ce fichier.
#
# Lancer une seule fois :
#   docker compose -f docker-compose.infra.yml up -d
#
# Mise a jour (rare, manuelle) :
#   docker compose -f docker-compose.infra.yml pull
#   docker compose -f docker-compose.infra.yml up -d
# =============================================================

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - app-network
    restart: unless-stopped

networks:
  # IMPORTANT : reseau partage avec le compose applicatif
  # Le name explicite permet au compose backend/frontend de le rejoindre
  # via "external: true"
  app-network:
    name: app-network
    driver: bridge

volumes:
  pg_data:
