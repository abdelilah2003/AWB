services:
  postgres_db:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USER}/awb-backend:${BUILD_TAG:-latest}
    container_name: awb-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres_db
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USER}/awb-frontend:${BUILD_TAG:-latest}
    container_name: awb-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # Pour Prometheus monitoring
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
